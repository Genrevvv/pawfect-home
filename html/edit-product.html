<div id="edit-product-container" class="management-add-container">
    <h2 class="label">Edit Product</h2>

    <div class="container-1">
        <div class="input-container">
            <span>Product name</span>
            <input id="edit-product-name" name="product-name" type="text">
        </div>
        <div class="select-input">
            <div class="input-container">
                <span>Category</span>
                <select id="edit-category" name="category">
                    <option value="pet_foods">Pet Foods</option>
                    <option value="pet_gadgets">Pet Gadgets</option>
                    <option value="pet_houses">Pet Houses</option>
                </select>
            </div>
            <div class="input-container">
                <span>Pet Type</span>
                <select id="edit-pet-type" name="pet-type">
                    <option value="cat">Cat</option>
                    <option value="dog">Dog</option>
                    <option value="cosmic_annihilator">Cosmic Annihilator</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container-2">
        <div class="input-container">
            <span>Price</span>
            <input id="edit-price" name="price" type="number">
            </div>
        <div class="input-container">
            <span>Stock Quantity</span>
            <input id="edit-stock" name="stock-quantity" type="number">
        </div>
    </div>

    <div class="container-3">
        <span>Upload Image</span>
        <div id="edit-uploaded-image-area" class="upload-image-area">
            <span>Upload Image</span>
            <i class="fa-solid fa-x remove-image"></i>
        </div>
    </div>

    <button id="update-product" class="add-element-btn">Update Product</button>
</div>
