<div class="preview-modal">
    <div class="modal-header">
        <h2>Pet Details</h2>
        <button id="close-btn" class="close-btn">✕</button>
    </div>

    <div class="pet-image-container">
        <img id="pet-image" src="assets/images/meowy.png" alt="Dog Image">
    </div>

    <div class="pet-details">
        <div class="detail-row">
            <span class="label">Name</span>
            <span id="pet-name" class="value">ax</span>
        </div>
        <div class="detail-row">
            <span class="label">Breed</span>
            <span id="breed" class="value">Golden Retriever</span>
        </div>
        <div class="detail-row">
            <span class="label">Age</span>
            <span id="age" class="value">2 Years Old</span>
        </div>
        <div class="detail-row">
            <span class="label">Sex</span>
            <span id="sex" class="value">Male</span>
        </div>
    </div>
    <div class="description-container">
        <h3>Description</h3>
        <p id="description">
            Max is a friendly and playful dog that loves 
            people and enjoys outdoor activities.
        </p>
    </div>
    <div class="btn-container">
        <a id="adopt-now-btn" class="adopt-btn">Adopt Now</a>
    </div>
</div>
