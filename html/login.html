<div id="container">
    <div id="form-container">

        <img src="assets/images/welcomebackcat.png" alt="cat"
        id="loginCatElement">

        <h1>Welcome Back!</h1>

        <form id="form">
            <div class="input">
                <span>Username</span>
                <input id="username" type="text" name="username" autofocus>
            </div>
            <div class="input">
                <span>Password</span>
                <input id="password" type="password" name="password">
            </div>

            <div id="submit">
                <button id="login" type="submit">Login</button>
            </div>
        </form>

        <span id="message">
        <p>New to the Family? <a href="#" id="to-register">click here</a></p></span>
    </div>
</div>
