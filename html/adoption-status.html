<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoption Status</title>

    <link rel="stylesheet" href="/assets/fontawsome/css/all.min.css">
    <link rel="stylesheet" href="/assets/fontawsome/css/fontawesome.min.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/adoption-management.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/cart.css">
    <link rel="stylesheet" href="/css/checkout.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/header-bar.css">
    <link rel="stylesheet" href="/css/management.css">
    <link rel="stylesheet" href="/css/rev-adoption-app.css">
    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/status.css">
</head>

<body>
    <header>
        <nav id="header-bar">
            <a id="logo" href="/"><img src="../assets/images/Logo.png" alt="Logo"></a>
            <div id="header-options">
                <ul>
                    <li>
                        <a id="adoption-status">Adoptions</a>
                    </li>
                    <li>
                        <a id="order-status">Orders</a>
                    </li>
                    <li>
                        <a id="about-us">About us</a>
                    </li>
                    <li>
                        <i id="cart-btn" class="fa-solid fa-cart-shopping">
                            <span id="cart-item-count" style="visibility: hidden;">
                            </span>
                        </i>
                    </li>
                </ul>
                <div id="auth-btn">LOGIN / REGISTER</div>
            </div>
        </nav>
    </header>

    <main>
        <div id="message-overlay"></div>
        <div id="overlay-container"></div>

        <section class="table-section">
            <div class="tables">
                <div class="title">
                    <h1>Application Logs</h1>
                    <p id="text">View your adoption application status.</p>
                </div>
                <div class="table-container">
                    <div class="table-scroll">
                        <table class="main-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Pet Details</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/adoption-status.js" type="module"></script>
    <script src="/js/init.js" type="module"></script>
    <script src="/js/header-bar.js" type="module"></script>
    </body>
</html>
