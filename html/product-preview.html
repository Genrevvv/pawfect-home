<div class="preview-modal">
    <div class="modal-header">
        <h2>Product Details</h2>
        <button id="close-btn" class="close-btn">✕</button>
    </div>

    <div class="product-image-container">
        <img id="product-image" src="assets/images/meowy.png" alt="Dog  Image">
    </div>

    <div class="product-details">
        <div class="detail-row">
            <span class="label">Product</span>
            <span id="product-name" class="value">ax</span>
        </div>
        <div class="detail-row">
            <span class="label">Price</span>
            <span id="price" class="value">Golden Retriever</span>
        </div>
        <div class="detail-row">
            <span class="label">Stock</span>
            <span id="stock" class="value">67</span>
        </div>
        <div class="detail-row">
            <span class="label">Category</span>
            <span id="category" class="value">Male</span>
        </div>
    </div>
    <div class="description-container">
        <h3>Description</h3>
        <p id="description">
            Max is a friendly and playful dog that loves 
            people and enjoys outdoor activities.
        </p>
    </div>
    <div class="btn-container">
        <a id="add-cart" class="cart-btn">Add to Cart</a>
    </div>
</div>
