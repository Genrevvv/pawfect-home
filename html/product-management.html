<div id="product-management">
    <div class="header">
        <h1 class="header"><i class="fa-solid fa-paw"></i> Product Management</h1>
    </div>

    <div id="product-management-container">

        <div id="add-product-container">
            <h2 class="label">Add New Product</h2>

            <div class="container-1">
                <div class="input-container">
                    <span>Product name</span>
                    <input id="product-name" name="product-name" type="text">
                 </div>
                <div class="input-container">
                    <span>Category</span>
                    <select id="category" name="category">
                        <option value="pet_foods">Pet Foods</option>
                        <option value="pet_gadgets">Pet Gadgets</option>
                        <option value="pet_houses">Pet Houses</option>
                    </select>
                </div>
            </div>

            <div class="container-2">
                <div class="input-container">
                    <span>Price</span>
                    <input id="price" name="price" type="number">
                 </div>
                <div class="input-container">
                    <span>Stock Quantity</span>
                    <input id="stock" name="stock-quantity" type="number">
                </div>
            </div>

            <div class="container-3">
                <span>Upload Image</span>
                <div id="upload-image-area">
                    <span>Upload Image</span>
                    <i class="fa-solid fa-x remove-image"></i>
                </div>
            </div>

            <button id="add-product">Add Product</button>
        </div>

        <div id="product-list">
            <h2 class="label">Product List Table</h2>
            <!-- temp, remove later -->
            <table id="product-log">
                <tr>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </table>
        </div>
    </div>
</div>
