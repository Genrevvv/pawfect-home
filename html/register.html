<div id="container">
    <div id="form-container">
        <h1>Register</h1>

        <form id="form">
            <div class="input">
                <span>Username</span>
                <input id="username" type="text" name="username" autofocus>
            </div>
            <div class="input">
                <span>Password</span>
                <input id="password" type="password" name="password">
            </div>
            <div class="input">
                <span>Confirm Password</span>
                <input id="confirm" type="password" type="password" name="confirm">
            </div>

            <div id="submit">
                <button id="login" type="submit">Join our Family</button>
            </div>
        </form>
        
        <span id="message">
        <p id="rmessage">Already have an account? <a href="/login">click here</a></p>
        </span>
    </div>
</div>
