<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/assets/fontawsome/css/all.min.css">
    <link rel="stylesheet" href="/assets/fontawsome/css/fontawesome.min.css">
    <link rel="stylesheet" href="/css/animation.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/cart.css">
    <link rel="stylesheet" href="/css/checkout.css">
    <link rel="stylesheet" href="/css/content.css">
    <link rel="stylesheet" href="/css/content-preview.css">
    <link rel="stylesheet" href="/css/featured.css">
    <link rel="stylesheet" href="/css/header-bar.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/nav-bar.css">
    <link rel="stylesheet" href="/css/nav-content.css">
    <link rel="stylesheet" href="/css/product-preview.css">
    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/search-content.css">
    <link rel="stylesheet" href="/css/delete-account.css">
    <link rel="stylesheet" href="/css/goodbye.css">
</head>
<body>
    <header>
        <nav id="header-bar">
            <a id="logo" href="/"><img src="assets/images/Logo.png" alt="Logo"></a>
            <div id="header-options">
                <ul>
                    <li>
                        <a id="adoption-status">Adoptions</a>
                    </li>
                    <li>
                        <a id="order-status">Orders</a>
                    </li>
                    <li><a id="about-us">About us</a></li>
                    <li>
                        <i id="cart-btn" class="fa-solid fa-cart-shopping">
                            <span id="cart-item-count" style="visibility: hidden;">
                            </span>
                        </i>
                    </li>
                </ul>
                <div class="auth-btn" id="auth-btn">LOGIN / REGISTER</div>
            </div>
        </nav>
    </header>
    <div id="account-options" style="display: none;">
        <span id="delete-account">DELETE ACCOUNT</span>
        <span id="logout">LOG OUT</span>
    </div>
    
    <main>
        <div id="message-overlay"></div>
        <div id="overlay-container"></div>
        <div id="hero-img">
            <img src="assets/images/catsndogs-header.png" alt="">
        </div>
        <div id="nav-bar">
            <div id="search-bar">
                <input id="search-input" type="text" placeholder="Search for Dogs, Cats, Foods...">
                <button id="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <div id="nav-options">
                <div class="nav-option" id="adopt-pet">
                    <img src="assets/images/adopt-icon.png" alt="">
                    <span>Adopt a Pet</span>
                </div>
                <div class="nav-option" id="pet-houses">
                    <img src="assets/images/home-icon.png" alt="">
                    <span>Pet Houses</span>
                </div>
                <div class="nav-option" id="pet-gadgets">
                    <img src="assets/images/product-icon.png" alt="">
                    <span>Pet Gadgets</span>
                    
                </div>
                <div class="nav-option" id="pet-foods">
                    <img src="assets/images/food-icon.png" alt="">
                    <span>Pet Foods</span>
                </div>
            </div>
        </div>

        <div id="content">
        </div>

        <div id="search-content">

        </div>
    </main>

    <script src="/js/init.js" type="module"></script>
    <script src="/js/header-bar.js" type="module"></script>
    <script src="/js/home.js" type="module"></script>
    <script src="/js/search.js" type="module"></script>
</body> 
</html>
